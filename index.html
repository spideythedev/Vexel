<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexel — Vector Graphics Engine</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256'%3E%3Crect width='256' height='256' rx='48' fill='%230c0a09'/%3E%3Cpolygon points='128,40 228,90 228,166 128,216 28,166 28,90' fill='none' stroke='%23FF5722' stroke-width='8'/%3E%3Cpath d='M100 120 L128 80 L156 120' fill='none' stroke='%23FF5722' stroke-width='6' stroke-linecap='round'/%3E%3Ccircle cx='128' cy='148' r='12' fill='%23FF5722'/%3E%3C/svg%3E">
    <style>
        :root {
            --bg: #0c0a09;
            --surface: #1c1917;
            --surface2: #292524;
            --border: #292524;
            --text: #fafaf9;
            --text-secondary: #a8a29e;
            --text-muted: #78716c;
            --accent: #ff5722;
            --accent-hover: #ff7043;
            --accent-gradient: linear-gradient(135deg, #ff5722, #ff9800);
            --radius: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        html { height:100%; background:var(--bg); }
        body { font-family:var(--font); background:var(--bg); color:var(--text); height:100%; display:flex; }

        .sidebar {
            width:300px; min-width:300px; background:var(--surface);
            border-right:1px solid var(--border); display:flex; flex-direction:column;
            z-index:10;
        }
        .sidebar-brand {
            display:flex; align-items:center; gap:10px;
            padding:14px 16px; border-bottom:1px solid var(--border);
        }
        .sidebar-brand svg { width:28px; height:28px; flex-shrink:0; }
        .sidebar-brand h1 { font-size:15px; font-weight:700; letter-spacing:-0.3px; }
        .sidebar-brand span { font-size:9px; color:var(--accent); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; margin-left:auto; }

        .code-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .code-header {
            display:flex; align-items:center; justify-content:space-between;
            padding:8px 14px; background:var(--surface2); border-bottom:1px solid var(--border);
        }
        .code-tab { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); }
        .run-btn {
            padding:5px 14px; border:none; border-radius:20px;
            background:var(--accent); color:#fff; font-size:10px; font-weight:600;
            cursor:pointer; font-family:var(--font); letter-spacing:0.3px;
            transition:var(--transition);
        }
        .run-btn:hover { background:var(--accent-hover); }
        .run-btn:active { transform:scale(0.95); }

        .code-editor {
            flex:1; position:relative; overflow:hidden;
        }
        .code-editor textarea {
            width:100%; height:100%; background:transparent; border:none;
            color:var(--text); font-family:var(--mono); font-size:12px;
            line-height:1.7; padding:14px; resize:none; outline:none;
            tab-size:2; caret-color:var(--accent);
        }
        .code-editor textarea::selection { background:rgba(255,87,34,0.3); }
        .code-line-numbers {
            position:absolute; top:0; left:0; bottom:0; width:36px;
            padding:14px 0; font-family:var(--mono); font-size:11px;
            line-height:1.7; color:var(--text-muted); text-align:right;
            pointer-events:none; user-select:none; overflow:hidden;
        }

        .error-bar {
            background:rgba(239,68,68,0.15); border-top:1px solid rgba(239,68,68,0.3);
            color:#ef4444; padding:8px 14px; font-size:11px; font-family:var(--mono);
            display:none;
        }
        .error-bar.show { display:block; }

        .canvas-area { flex:1; position:relative; overflow:hidden; background:#fafaf9; }
        .canvas-area canvas { position:absolute; top:0; left:0; }

        .toolbar-overlay {
            position:absolute; top:12px; right:12px; display:flex; gap:4px; z-index:10;
        }
        .tool-btn {
            width:32px; height:32px; border-radius:var(--radius); border:1px solid #ddd;
            background:#fff; color:#1c1917; cursor:pointer; font-size:14px;
            display:flex; align-items:center; justify-content:center;
            transition:var(--transition); font-family:var(--font);
        }
        .tool-btn:hover { background:#f5f5f5; border-color:#ccc; }

        .status-bar {
            position:absolute; bottom:0; left:0; right:0;
            height:26px; background:#fff; border-top:1px solid #e7e5e4;
            display:flex; align-items:center; padding:0 12px;
            font-size:10px; color:#78716c; gap:16px; z-index:10;
        }

        .floating-logo {
            position:absolute; bottom:40px; right:16px;
            opacity:0.04; pointer-events:none; z-index:0;
        }
        .floating-logo svg { width:200px; height:200px; }

        @media (max-width:768px) {
            body { flex-direction:column; }
            .sidebar { width:100%; min-width:100%; max-height:45%; }
            .canvas-area { height:55%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">
            <svg width="28" height="28" viewBox="0 0 256 256">
                <rect width="256" height="256" rx="48" fill="#0c0a09"/>
                <polygon points="128,40 228,90 228,166 128,216 28,166 28,90" fill="none" stroke="#FF5722" stroke-width="8"/>
                <circle cx="128" cy="148" r="14" fill="#FF5722"/>
                <path d="M100 118 L128 78 L156 118" fill="none" stroke="#FF5722" stroke-width="6" stroke-linecap="round"/>
            </svg>
            <div>
                <h1>Vexel</h1>
                <div style="font-size:9px;color:var(--text-muted);">Vector Graphics Engine</div>
            </div>
            <span>v1.0</span>
        </div>

        <div class="code-area">
            <div class="code-header">
                <span class="code-tab">script.js</span>
                <button class="run-btn" id="runBtn">Run</button>
            </div>
            <div class="code-editor">
                <textarea id="codeInput" spellcheck="false">// Vexel — Vector Graphics Engine Demo
// Edit and press Ctrl+Enter to run

vex.clear();

// Orange rounded rectangle
vex.rectangle(40, 40, 220, 140, {
  fill: '#FF5722',
  stroke: '#1c1917',
  strokeWidth: 3,
  cornerRadius: 16
});

// Blue circle with opacity
vex.ellipse(340, 110, 65, 65, {
  fill: '#3B82F6',
  opacity: 0.85
});

// Green triangle
vex.polygon(520, 110, 3, 55, {
  fill: '#22C55E'
});

// Dashed line
vex.line(40, 240, 640, 240, {
  stroke: '#1c1917',
  strokeWidth: 2,
  strokeDash: [8, 4]
});

// Purple path
vex.path([
  { x: 40, y: 300 },
  { x: 140, y: 270 },
  { x: 240, y: 330 },
  { x: 190, y: 390 },
  { x: 70, y: 370 }
], {
  fill: '#7C3AED',
  stroke: '#1c1917',
  strokeWidth: 2,
  closed: true
});

// Bold text
vex.text(400, 330, 'Hello Vexel', {
  fontSize: 34,
  fontWeight: '800',
  fill: '#FF5722',
  letterSpacing: '-0.5px'
});

// Small caption
vex.text(400, 375, 'The Vector Graphics Engine', {
  fontSize: 12,
  fill: '#78716c',
  fontWeight: '500'
});

vex.zoomToFit();</textarea>
            </div>
            <div class="error-bar" id="errorBar"></div>
        </div>
    </div>

    <div class="canvas-area" id="canvasContainer">
        <div class="toolbar-overlay">
            <button class="tool-btn" id="zoomInBtn" title="Zoom In">+</button>
            <button class="tool-btn" id="zoomOutBtn" title="Zoom Out">-</button>
            <button class="tool-btn" id="fitBtn" title="Fit All">F</button>
            <button class="tool-btn" id="svgBtn" title="Export SVG">S</button>
            <button class="tool-btn" id="pngBtn" title="Export PNG">P</button>
        </div>
        <div class="floating-logo">
            <svg viewBox="0 0 256 256"><polygon points="128,40 228,90 228,166 128,216 28,166 28,90" fill="none" stroke="#FF5722" stroke-width="6"/><circle cx="128" cy="148" r="14" fill="#FF5722"/></svg>
        </div>
        <div class="status-bar" id="statusBar">
            <span id="statusShapes">0 shapes</span>
            <span id="statusZoom">100%</span>
            <span id="statusPos">X: 0 Y: 0</span>
            <span>Vexel v1.0</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/spideythedev/vexel@main/dist/vexel.js"></script>
    <script>
        const container = document.getElementById('canvasContainer');
        const codeInput = document.getElementById('codeInput');
        const errorBar = document.getElementById('errorBar');
        const statusShapes = document.getElementById('statusShapes');
        const statusZoom = document.getElementById('statusZoom');
        const statusPos = document.getElementById('statusPos');

        const vex = new Vexel({
            container: container,
            width: container.clientWidth,
            height: container.clientHeight,
            grid: false
        });

        function showError(msg) {
            errorBar.textContent = msg;
            errorBar.classList.add('show');
            setTimeout(() => errorBar.classList.remove('show'), 3000);
        }

        function updateStatus() {
            statusShapes.textContent = vex.shapes.length + ' shapes';
            statusZoom.textContent = Math.round(vex.viewport.zoom * 100) + '%';
        }

        function runCode() {
            try {
                const fn = new Function('vex', codeInput.value);
                fn(vex);
                errorBar.classList.remove('show');
                updateStatus();
            } catch (e) {
                showError(e.message);
            }
        }

        document.getElementById('runBtn').addEventListener('click', runCode);
        document.getElementById('zoomInBtn').addEventListener('click', () => { vex.zoomIn(); updateStatus(); });
        document.getElementById('zoomOutBtn').addEventListener('click', () => { vex.zoomOut(); updateStatus(); });
        document.getElementById('fitBtn').addEventListener('click', () => { vex.zoomToFit(); updateStatus(); });
        document.getElementById('svgBtn').addEventListener('click', () => {
            const svg = vex.exportSVG();
            const blob = new Blob([svg], { type: 'image/svg+xml' });
            window.open(URL.createObjectURL(blob));
        });
        document.getElementById('pngBtn').addEventListener('click', async () => {
            const blob = await vex.exportPNG(1);
            window.open(URL.createObjectURL(blob));
        });

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                runCode();
            }
        });

        window.addEventListener('resize', () => {
            vex.resize(container.clientWidth, container.clientHeight);
            updateStatus();
        });

        runCode();
        updateStatus();
    </script>
</body>
</html>
